name: Screenshot & Notify

on:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types:
      - completed

permissions:
  contents: write

jobs:
  screenshot:
    name: Screenshot deployed site
    runs-on:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' '24'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Wait for GitHub Pages and take screenshot with retry
        run: |
          cat > take-screenshot.mjs << 'EOF'
          import { chromium } from 'playwright';
          
          const MAX_RETRIES = 5;
          const DELAY = 10000; // 10 seconds between retries
          const URL = 'https://ex2-axon.github.io/x-template-006/';
          
          for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
            try {
              console.log(`Attempt ${attempt}/${MAX_RETRIES}: Taking screenshot...`);
              const browser = await chromium.launch();
              const page = await browser.newPage();
              await page.setViewportSize({ width: 1280, height: 720 });
              
              await page.goto(URL, {
                waitUntil: 'networkidle',
                timeout: 30000
              });
              
              await page.waitForTimeout(2000);
              await page.screenshot({ path: 'screenshot.png', fullPage: false });
              await browser.close();
              
              console.log('Screenshot saved successfully');
              process.exit(0);
            } catch (error) {
              console.error(`Attempt ${attempt} failed:`, error.message);
              
              if (attempt < MAX_RETRIES) {
                console.log(`Waiting ${DELAY / 1000}s before retry...`);
                await new Promise(r => setTimeout(r, DELAY));
              } else {
                console.error('All attempts failed');
                process.exit(1);
              }
            }
          }
          EOF
          node take-screenshot.mjs

      - name: Read package info
        id: pkg
        run: |
          echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT
          echo "app_name=$(node -p \"require('./package.json').name\")" >> $GITHUB_OUTPUT

      - name: Get commit info
        id: commit
        run: |
          echo "message=$(git log -1 --pretty=format:'%s')" >> $GITHUB_OUTPUT
          echo "hash=$(git log -1 --pretty=format:'%h')" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: screenshot-${{ steps.pkg.outputs.version }}
          path: screenshot.png
          retention-days: 30

      - name: Commit screenshot to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p .github/screenshots
          cp screenshot.png .github/screenshots/latest.png
          cp screenshot.png ".github/screenshots/v${{ steps.pkg.outputs.version }}.png"
          git add .github/screenshots/
          git diff --staged --quiet || git commit -m "chore: update screenshot v${{ steps.pkg.outputs.version }} [skip ci]"
          git push

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          APP_NAME: ${{ steps.pkg.outputs.app_name }}
          VERSION: ${{ steps.pkg.outputs.version }}
          COMMIT_HASH: ${{ steps.commit.outputs.hash }}
          COMMIT_MSG: ${{ steps.commit.outputs.message }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord Webhook URL is missing. Skipping notification."
            exit 0
          fi

          cat > discord-notify.mjs << 'EOF'
          import { readFileSync } from 'fs';

          const webhookUrl = process.env.DISCORD_WEBHOOK;
          const siteUrl = 'https://ex2-axon.github.io/x-template-006/';
          
          const payload = {
            username: 'Axon Deploy Bot',
            embeds: [{
              title: `${process.env.APP_NAME} v${process.env.VERSION} deployed`,
              url: siteUrl,
              color: 0x00FFFF,
              fields: [{
                name: 'Commit',
                value: `${process.env.COMMIT_HASH} ${process.env.COMMIT_MSG}`
              }],
              image: { url: 'attachment://screenshot.png' },
              timestamp: new Date().toISOString()
            }]
          };

          const formData = new FormData();
          formData.append('payload_json', JSON.stringify(payload));
          
          const imageBuffer = readFileSync('screenshot.png');
          const blob = new Blob([imageBuffer], { type: 'image/png' });
          formData.append('files[0]', blob, 'screenshot.png');

          const response = await fetch(webhookUrl, {
            method: 'POST',
            body: formData
          });

          if (response.ok) {
            console.log('Sent to Discord');
          } else {
            console.error('Failed to send to Discord:', await response.text());
            process.exit(1);
          }
          EOF
          node discord-notify.mjs


