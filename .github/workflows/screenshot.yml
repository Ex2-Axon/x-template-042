name: Screenshot & Notify

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types:
      - completed

permissions:
  contents: write

jobs:
  screenshot:
    name: Screenshot deployed site
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Wait for GitHub Pages to propagate
        run: sleep 30

      - name: Take screenshot
        run: |
          cat > take-screenshot.mjs << 'EOF'
          import { chromium } from 'playwright';
          const browser = await chromium.launch();
          const page = await browser.newPage();
          await page.setViewportSize({ width: 1280, height: 720 });
          await page.goto('https://ex2-axon.github.io/x-template/', {
            waitUntil: 'networkidle',
            timeout: 30000
          });
          await page.waitForTimeout(2000);
          await page.screenshot({ path: 'screenshot.png', fullPage: false });
          await browser.close();
          console.log('Screenshot saved');
          EOF
          node take-screenshot.mjs

      - name: Read package info
        id: pkg
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "app_name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT

      - name: Get commit info
        id: commit
        run: |
          echo "message=$(git log -1 --pretty=format:'%s')" >> $GITHUB_OUTPUT
          echo "hash=$(git log -1 --pretty=format:'%h')" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ steps.pkg.outputs.version }}
          path: screenshot.png
          retention-days: 30

      - name: Commit screenshot to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p .github/screenshots
          cp screenshot.png .github/screenshots/latest.png
          cp screenshot.png ".github/screenshots/v${{ steps.pkg.outputs.version }}.png"
          git add .github/screenshots/
          git diff --staged --quiet || git commit -m "chore: update screenshot v${{ steps.pkg.outputs.version }} [skip ci]"
          git push

      - name: Send to Discord
        run: |
          SITE_URL="https://ex2-axon.github.io/x-template/"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          curl -s -o /dev/null \
            -F "payload_json={\"username\":\"Axon Deploy Bot\",\"embeds\":[{\"title\":\"${{ steps.pkg.outputs.app_name }} v${{ steps.pkg.outputs.version }} deployed\",\"url\":\"${SITE_URL}\",\"color\":65535,\"fields\":[{\"name\":\"Commit\",\"value\":\"${{ steps.commit.outputs.hash }} ${{ steps.commit.outputs.message }}\"}],\"image\":{\"url\":\"attachment://screenshot.png\"},\"timestamp\":\"${TIMESTAMP}\"}]}" \
            -F "files[0]=@screenshot.png;type=image/png" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
          echo "Sent to Discord"

      - name: Post to Bluesky
        run: |
          cat > bsky.mjs << 'EOF'
          import { readFileSync } from 'fs';

          const BSKY_ID  = process.env.BSKY_IDENTIFIER;
          const BSKY_PW  = process.env.BSKY_APP_PASSWORD;
          const APP_NAME = process.env.APP_NAME;
          const VERSION  = process.env.VERSION;
          const COMMIT   = process.env.COMMIT_MSG;
          const SITE_URL = 'https://ex2-axon.github.io/x-template/';

          // 1. Auth
          const authRes = await fetch('https://bsky.social/xrpc/com.atproto.server.createSession', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ identifier: BSKY_ID, password: BSKY_PW })
          });
          const auth = await authRes.json();
          if (!auth.accessJwt) { console.error('Auth failed:', auth); process.exit(1); }

          // 2. Upload image
          const img = readFileSync('screenshot.png');
          const blobRes = await fetch('https://bsky.social/xrpc/com.atproto.repo.uploadBlob', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${auth.accessJwt}`, 'Content-Type': 'image/png' },
            body: img
          });
          const blobData = await blobRes.json();

          // 3. Build post text
          const text = `${APP_NAME} v${VERSION} deployed\n\n${COMMIT}\n${SITE_URL}\n\n#webdev #vite #react`;
          const enc = new TextEncoder();
          const tb = enc.encode(text);
          const ub = enc.encode(SITE_URL);
          let byteStart = -1;
          for (let i = 0; i <= tb.length - ub.length; i++) {
            if ([...ub].every((b, j) => tb[i + j] === b)) { byteStart = i; break; }
          }

          // 4. Post
          const postRes = await fetch('https://bsky.social/xrpc/com.atproto.repo.createRecord', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${auth.accessJwt}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              repo: auth.did,
              collection: 'app.bsky.feed.post',
              record: {
                $type: 'app.bsky.feed.post',
                text,
                facets: byteStart >= 0 ? [{
                  index: { byteStart, byteEnd: byteStart + ub.length },
                  features: [{ $type: 'app.bsky.richtext.facet#link', uri: SITE_URL }]
                }] : [],
                embed: {
                  $type: 'app.bsky.embed.images',
                  images: [{ image: blobData.blob, alt: `Screenshot of ${APP_NAME}` }]
                },
                createdAt: new Date().toISOString()
              }
            })
          });
          const result = await postRes.json();
          if (result.uri) { console.log('Posted to Bluesky:', result.uri); }
          else { console.error('Failed:', result); process.exit(1); }
          EOF
          node bsky.mjs
        env:
          BSKY_IDENTIFIER: ${{ secrets.BSKY_IDENTIFIER }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          APP_NAME: ${{ steps.pkg.outputs.app_name }}
          VERSION: ${{ steps.pkg.outputs.version }}
          COMMIT_MSG: ${{ steps.commit.outputs.message }}
